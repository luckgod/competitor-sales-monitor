adb:
  device_serial: null
  adb_path: C:\Program Files\scrcpy\scrcpy-win64-v3.1\adb.exe
  scrcpy_path: C:\Program Files\scrcpy\scrcpy-win64-v3.1\scrcpy.exe
scrcpy:
  max_size: 1080
  max_fps: 15
  bit_rate: 8M
  stay_awake: false
queue:
  max_size: 10
  low_watermark: 7
  producer_block_timeout: 30
session:
  state_file: state/session_state.json
watchdog:
  check_interval: 5.0
  reconnect_retries: 3
  wireless_fallback: true
slide:
  min_pause: 1.5
  max_pause: 4.0
  swipe_duration_min: 300
  swipe_duration_max: 800
capture:
  screenshot_dir: captures
ocr:
  paddleocr_lang: ch
  llm_model: qwen2.5:7b
  ollama_url: http://localhost:11434
